name: PhiloMind Continuous Integration

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-ci:
    name: Backend CI (Lint & Test)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: 'backend/package-lock.json'

      - name: Install Dependencies
        run: |
          cd backend
          npm ci

      - name: Generate Prisma Client
        run: |
          cd backend
          npx prisma generate

      - name: Check Format
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          cd backend
          if [ -z "$BASE_SHA" ] || [[ "$BASE_SHA" =~ ^0+$ ]]; then
            BASE_SHA="HEAD~1"
          fi
          FILES=$(git diff --name-only --relative=backend --diff-filter=ACMRT "$BASE_SHA" HEAD -- src prisma | grep -E '\.ts$' || true)
          if [ -n "$FILES" ]; then
            printf '%s\n' "$FILES" | xargs npx prettier --check
          else
            echo "No changed backend TypeScript files to format-check."
          fi

      - name: Run Tests
        run: |
          cd backend
          npm run test -- --runInBand

      - name: Audit Dependencies
        run: |
          cd backend
          npm audit --audit-level=high

  frontend-ci:
    name: Frontend CI (Build Verification)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install Dependencies
        run: |
          cd frontend
          npm ci

      - name: Run Tests
        run: |
          cd frontend
          npm run test -- --run

      - name: Build Verification
        run: |
          cd frontend
          npm run build

      - name: Audit Dependencies
        run: |
          cd frontend
          npm audit --audit-level=high

  admin-ci:
    name: Admin CI (Build Verification)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: 'admin/package-lock.json'

      - name: Install Dependencies
        run: |
          cd admin
          npm ci

      - name: Run Tests
        run: |
          cd admin
          npm run test -- --run

      - name: Build Verification
        run: |
          cd admin
          npm run build

      - name: Audit Dependencies
        run: |
          cd admin
          npm audit --audit-level=high
