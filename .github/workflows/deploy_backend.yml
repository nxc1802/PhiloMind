name: PhiloMind Backend Continuous Deployment to Hugging Face

on:
  push:
    branches: [ main, master ]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy_backend.yml'

jobs:
  deploy-backend:
    name: Deploy Backend to Hugging Face Space
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v3

      - name: Push Backend to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          
          # Set up git credentials store securely
          git config --global credential.helper store
          echo "https://Cuong2004:$HF_TOKEN@huggingface.co" > ~/.git-credentials
          
          # Clone the Hugging Face Space repository
          git clone https://Cuong2004:$HF_TOKEN@huggingface.co/spaces/Cuong2004/PhiloMind hf_backend
          
          # Clear the cloned folder (excluding the .git folder)
          find hf_backend -maxdepth 1 ! -name 'hf_backend' ! -name '.git' -exec rm -rf {} +
          
          # Copy the backend folder contents into the cloned space
          cp -r backend/* hf_backend/
          
          # Check if there are changes to commit
          cd hf_backend
          git add .
          if git diff --cached --quiet; then
            echo "No changes in backend to deploy."
          else
            git commit -m "Deploy Backend from GitHub Actions Commit: ${{ github.sha }}"
            git push origin main
          fi
          
          # Clean up credentials
          rm -f ~/.git-credentials

      - name: Monitor Hugging Face Space Build and logs
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          echo "Waiting 10 seconds for Hugging Face to detect the push..."
          sleep 10
          
          # Fetch JWT token
          JWT_RESPONSE=$(curl -s -H "Authorization: Bearer $HF_TOKEN" https://huggingface.co/api/spaces/Cuong2004/PhiloMind/jwt)
          JWT_TOKEN=$(echo $JWT_RESPONSE | jq -r '.token')
          
          if [ "$JWT_TOKEN" = "null" ] || [ -z "$JWT_TOKEN" ]; then
            echo "Failed to retrieve JWT token. Response: $JWT_RESPONSE"
            exit 1
          fi
          
          echo "Successfully retrieved JWT token. Monitoring Space runtime status..."
          
          # Poll Space status
          for i in {1..30}; do
            STATUS_JSON=$(curl -s https://huggingface.co/api/spaces/Cuong2004/PhiloMind)
            STAGE=$(echo $STATUS_JSON | jq -r '.runtime.stage')
            echo "Current stage: $STAGE (Attempt $i/30)"
            
            if [ "$STAGE" = "RUNNING" ]; then
              echo "Space is successfully RUNNING!"
              break
            elif [ "$STAGE" = "RUNTIME_ERROR" ] || [ "$STAGE" = "BUILD_ERROR" ] || [ "$STAGE" = "CRASHED" ]; then
              echo "Space build/runtime encountered an error: $STAGE"
              break
            fi
            sleep 20
          done
          
          # Print Logs
          echo "=== HUGGING FACE BUILD LOGS ==="
          curl -s -H "Authorization: Bearer $JWT_TOKEN" "https://api.hf.space/v1/Cuong2004/PhiloMind/logs/build" | tail -n 100
          
          echo "=== HUGGING FACE RUNTIME LOGS ==="
          curl -s -H "Authorization: Bearer $JWT_TOKEN" "https://api.hf.space/v1/Cuong2004/PhiloMind/logs/run" | tail -n 100
