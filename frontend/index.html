<!DOCTYPE html>
<html lang="vi">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <meta charset="utf-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f8fbff" />
    <meta
      name="description"
      content="Dialectic Academy - Marxist-Leninist Philosophy Learning Platform"
    />
    <link rel="apple-touch-icon" href="/logo192.png" />
    <script>
      (function () {
        try {
          var key = "philomind_theme";
          var theme = localStorage.getItem(key) || "system";
          var prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
          var resolved = theme === "dark" || (theme === "system" && prefersDark) ? "dark" : "light";
          document.documentElement.classList.toggle("dark", resolved === "dark");
          document.documentElement.dataset.theme = resolved;
          document.documentElement.style.colorScheme = resolved;
        } catch (_) {}
      })();
    </script>
    <!-- Material Design Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <link rel="manifest" href="/manifest.json" />
    <title>Dialectic Academy — Marxist-Leninist Philosophy Learning</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/index.jsx"></script>
  </body>
</html>
